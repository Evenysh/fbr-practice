events {}

http {
  upstream backend {
    # 2 основных backend + 1 резервный (backup)
    server backend1:3000 max_fails=2 fail_timeout=10s;
    server backend2:3000 max_fails=2 fail_timeout=10s;
    server backend3:3000 backup;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://backend;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      # Если один backend недоступен — пробуем следующий
      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
      proxy_next_upstream_tries 3;
    }
  }
}

