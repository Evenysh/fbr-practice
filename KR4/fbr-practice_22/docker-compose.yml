name: fbr-practice-22-loadbalancing

services:
  backend1:
    image: node:18
    working_dir: /app
    volumes:
      - ./backend:/app
    command: node server.js
    environment:
      - PORT=3000
      - INSTANCE=backend1
    expose:
      - "3000"

  backend2:
    image: node:18
    working_dir: /app
    volumes:
      - ./backend:/app
    command: node server.js
    environment:
      - PORT=3000
      - INSTANCE=backend2
    expose:
      - "3000"

  backend3:
    image: node:18
    working_dir: /app
    volumes:
      - ./backend:/app
    command: node server.js
    environment:
      - PORT=3000
      - INSTANCE=backend3-backup
    expose:
      - "3000"

  # Nginx как балансировщик нагрузки
  nginx:
    image: nginx:stable
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    profiles: ["nginx"]

  # Альтернатива: HAProxy как балансировщик нагрузки
  haproxy:
    image: haproxy:2.9
    ports:
      - "8081:80"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    profiles: ["haproxy"]

