global
  log stdout format raw local0

defaults
  mode http
  log global
  option httplog
  timeout connect 5s
  timeout client  30s
  timeout server  30s

frontend http_front
  bind *:80
  default_backend http_back

backend http_back
  balance roundrobin
  option redispatch
  option httpchk GET /health
  http-check expect status 200
  default-server inter 2s fall 2 rise 1

  server server1 backend1:3000 check
  server server2 backend2:3000 check
  server server3 backend3:3000 check backup

