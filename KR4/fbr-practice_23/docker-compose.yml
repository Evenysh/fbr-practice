name: fbr-practice-23-loadbalancing

services:
  backend1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      SERVER_ID: backend-1
    expose:
      - "3000"

  backend2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      SERVER_ID: backend-2
    expose:
      - "3000"

  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
